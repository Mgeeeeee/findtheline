<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>草蛇灰线 · Find The Line</title>
  <meta name="description" content="发现 Flomo 笔记之间隐藏的连接，自动生成交互式笔记图谱">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface2: #f0efed;
      --text: #2c2c2c;
      --text-dim: #888888;
      --text-light: #aaaaaa;
      --accent: #e07850;
      --accent-light: #f4a882;
      --accent-bg: rgba(224,120,80,0.08);
      --border: #e8e6e3;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-hover: 0 3px 12px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    /* ─── Upload Screen ─────────────────────────── */
    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg);
    }

    .upload-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .upload-header h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .upload-header h1 span { color: var(--accent); }

    .upload-header p {
      font-size: 14px;
      color: var(--text-dim);
    }

    .drop-zone {
      width: 480px;
      height: 260px;
      border: 2px dashed var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-bg);
    }

    .drop-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .drop-zone p { font-size: 14px; color: var(--text-dim); }
    .drop-zone .hint { font-size: 12px; color: var(--text-light); margin-top: 8px; }

    .upload-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }

    .mode-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .mode-badge.basic { background: var(--surface2); color: var(--text-dim); }
    .mode-badge.ai { background: var(--accent-bg); color: var(--accent); }

    .api-indicator { font-size: 11px; color: var(--text-light); }
    .api-indicator.active { color: var(--accent); }

    /* ─── Processing Screen ─────────────────────── */
    .processing-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg);
    }

    .progress-container {
      width: 400px;
      text-align: center;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 13px;
      color: var(--text-dim);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* ─── Viz Screen ────────────────────────────── */
    .viz-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .header {
      height: 52px;
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header h1 { font-size: 15px; font-weight: 500; letter-spacing: 1px; }
    .header h1 span { color: var(--accent); }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header .stats { font-size: 12px; color: var(--text-dim); }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 6px; border: none;
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .icon-btn:hover { background: var(--border); color: var(--text); }

    /* Tabs */
    .tabs {
      height: 40px;
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      padding: 5px 16px; border-radius: 6px;
      cursor: pointer; font-size: 13px;
      color: var(--text-dim); transition: all 0.15s;
      border: none; background: none; font-family: inherit;
    }

    .tab:hover { color: var(--text); background: var(--surface2); }
    .tab.active { color: var(--accent); background: var(--accent-bg); font-weight: 500; }

    /* Main */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .filter-section { margin-bottom: 16px; }

    .filter-section label {
      display: block; font-size: 11px; color: var(--text-dim);
      letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500;
    }

    .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }

    .chip {
      padding: 2px 8px; border-radius: 12px; font-size: 10px;
      background: var(--surface2); color: var(--text-dim);
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.15s; font-family: inherit;
    }

    .chip:hover { color: var(--text); border-color: var(--border); }
    .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    .search-box {
      width: 100%; padding: 7px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 12px;
      outline: none; font-family: inherit;
    }

    .search-box::placeholder { color: var(--text-light); }
    .search-box:focus { border-color: var(--accent); }

    .sim-slider {
      width: 100%; -webkit-appearance: none; appearance: none;
      height: 3px; border-radius: 2px;
      background: var(--border); outline: none;
    }

    .sim-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .slider-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text-light); margin-top: 4px;
    }

    .slider-labels .sim-val { color: var(--accent); font-weight: 500; }

    /* Canvas */
    .canvas { flex: 1; position: relative; overflow: hidden; background: #1a1a22; }
    .canvas svg { width: 100%; height: 100%; }

    /* Tooltip */
    .tooltip {
      position: fixed; max-width: 340px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
      pointer-events: none; opacity: 0;
      transition: opacity 0.12s; z-index: 200;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    }

    .tooltip.visible { opacity: 1; }
    .tooltip .tt-time { font-size: 11px; color: var(--accent); margin-bottom: 3px; }
    .tooltip .tt-text { font-size: 12px; line-height: 1.6; margin-bottom: 5px; max-height: 90px; overflow: hidden; }
    .tooltip .tt-subtext {
      font-size: 11px; color: var(--accent); font-style: italic;
      margin-bottom: 5px; padding-left: 7px;
      border-left: 2px solid var(--accent-light);
    }
    .tooltip .tt-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .tooltip .tt-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      background: var(--accent-bg); color: var(--accent);
    }

    /* Detail panel */
    .detail-panel {
      position: fixed; right: -380px; top: 0; bottom: 0;
      width: 360px; background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 18px; overflow-y: auto;
      transition: right 0.25s; z-index: 50;
    }

    .detail-panel.open { right: 0; }

    .detail-panel .close-btn {
      position: absolute; top: 12px; right: 12px;
      background: var(--surface2); border: none; color: var(--text-dim);
      cursor: pointer; font-size: 13px; width: 26px; height: 26px;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
    }

    .detail-panel .close-btn:hover { background: var(--border); }
    .detail-panel h3 { font-size: 13px; color: var(--accent); margin-bottom: 8px; font-weight: 500; }
    .detail-panel .note-text { font-size: 13px; line-height: 1.8; margin-bottom: 12px; white-space: pre-wrap; }
    .detail-panel .meta-item { display: flex; align-items: flex-start; margin-bottom: 8px; }
    .detail-panel .meta-label { font-size: 11px; color: var(--text-dim); width: 48px; flex-shrink: 0; }
    .detail-panel .meta-value { font-size: 12px; color: var(--text); }
    .detail-panel .accent-text { color: var(--accent); font-style: italic; }

    .neighbor-list { list-style: none; }
    .neighbor-list li {
      padding: 7px 9px; border-radius: 6px; margin-bottom: 2px;
      background: var(--bg); font-size: 11px; cursor: pointer;
      transition: background 0.15s; border: 1px solid transparent;
    }
    .neighbor-list li:hover { border-color: var(--border); background: var(--surface2); }
    .neighbor-list .sim-badge { font-size: 10px; color: var(--accent); float: right; }

    /* Timeline */
    .timeline-container {
      display: none; width: 100%; height: 100%;
      overflow-y: auto; padding: 20px 30px; background: var(--bg);
    }
    .timeline-container.active { display: block; }
    .timeline-month { margin-bottom: 24px; }
    .timeline-month h2 {
      font-size: 14px; font-weight: 500; color: var(--text-dim);
      margin-bottom: 8px; position: sticky; top: 0;
      background: var(--bg); padding: 5px 0; z-index: 10;
    }
    .timeline-notes { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
    .timeline-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; cursor: pointer;
      transition: all 0.15s; border-left: 3px solid;
    }
    .timeline-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .timeline-card .tc-time { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
    .timeline-card .tc-text { font-size: 11px; line-height: 1.6; max-height: 64px; overflow: hidden; }
    .timeline-card .tc-subtext { font-size: 10px; color: var(--accent); margin-top: 5px; font-style: italic; }
    .timeline-card .tc-tags { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 5px; }
    .timeline-card .tc-tag { font-size: 9px; padding: 1px 4px; border-radius: 3px; background: var(--accent-bg); color: var(--accent); }

    /* Bridges */
    .bridges-view {
      display: none; width: 100%; height: 100%;
      overflow-y: auto; padding: 20px 30px; background: #1a1a22;
    }
    .bridges-view.active { display: block; }
    .bridge-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 16px; margin-bottom: 10px;
    }
    .bridge-card h3 { font-size: 13px; color: var(--accent); margin-bottom: 5px; font-weight: 500; }
    .bridge-card .bridge-text { font-size: 12px; line-height: 1.6; margin-bottom: 8px; color: rgba(255,255,255,0.7); }
    .bridge-card .bridge-subtext {
      font-size: 11px; color: var(--accent); font-style: italic;
      padding-left: 8px; border-left: 2px solid var(--accent-light); margin-bottom: 8px;
    }
    .bridge-connections { display: flex; flex-wrap: wrap; gap: 5px; }
    .bridge-conn {
      font-size: 10px; padding: 2px 7px; border-radius: 5px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }

    /* Legend */
    .legend {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(20,20,28,0.88); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      padding: 8px 10px; z-index: 30;
      max-height: 260px; overflow-y: auto;
    }
    .legend-title { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 5px; font-weight: 500; }
    .legend-item { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; font-size: 10px; color: rgba(255,255,255,0.45); }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* Settings panel */
    .settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 300; display: none;
      align-items: center; justify-content: center;
    }
    .settings-overlay.open { display: flex; }

    .settings-card {
      background: var(--surface); border-radius: 14px;
      padding: 28px; width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .settings-card h2 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
    .settings-card label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 6px; }

    .settings-card input[type="text"] {
      width: 100%; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border); font-size: 13px;
      font-family: monospace; outline: none;
    }

    .settings-card input[type="text"]:focus { border-color: var(--accent); }

    .settings-card .hint { font-size: 11px; color: var(--text-light); margin-top: 6px; line-height: 1.5; }
    .settings-card .hint a { color: var(--accent); }

    .settings-actions {
      display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;
    }

    .btn {
      padding: 7px 16px; border-radius: 8px; border: none;
      font-size: 13px; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #c86840; }
    .btn-secondary { background: var(--surface2); color: var(--text-dim); }
    .btn-secondary:hover { background: var(--border); }
    .btn-ghost { background: none; color: var(--text-light); font-size: 11px; }
    .btn-ghost:hover { color: var(--accent); }

    /* Responsive */
    @media (max-width: 768px) {
      .drop-zone { width: 90vw; height: 200px; }
      .sidebar { width: 220px; }
      .settings-card { width: 90vw; }
    }
  </style>
</head>
<body>

  <!-- ─── 上传界面 ─────────────────────────── -->
  <div class="upload-screen" id="uploadScreen">
    <div class="upload-header">
      <h1><span>草蛇灰线</span> · Find The Line</h1>
      <p>发现 Flomo 笔记之间隐藏的连接</p>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📄</div>
      <p>拖拽 Flomo 导出的 HTML 文件到这里</p>
      <p class="hint">或点击选择文件</p>
    </div>
    <input type="file" id="fileInput" accept=".html,.htm" style="display:none">
    <div class="upload-footer">
      <span class="mode-badge basic" id="modeBadge">基础模式</span>
      <span class="api-indicator" id="apiIndicator">未配置 API Key</span>
      <button class="icon-btn" id="settingsBtn" title="设置 Gemini API Key">⚙️</button>
    </div>
  </div>

  <!-- ─── 处理中界面 ───────────────────────── -->
  <div class="processing-screen" id="processingScreen">
    <div class="progress-container">
      <h2 style="font-size:16px;font-weight:500;margin-bottom:20px">正在分析笔记…</h2>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-text" id="progressText">准备中…</p>
    </div>
  </div>

  <!-- ─── 可视化界面 ───────────────────────── -->
  <div class="viz-screen" id="vizScreen">
    <div class="header">
      <h1><span>草蛇灰线</span> · 笔记图谱</h1>
      <div class="header-actions">
        <span class="stats" id="headerStats"></span>
        <button class="icon-btn" id="reuploadBtn" title="重新上传">↩</button>
        <button class="icon-btn" id="settingsBtn2" title="设置">⚙️</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-view="graph">网络图</button>
      <button class="tab" data-view="timeline">时间线</button>
      <button class="tab" data-view="bridges">桥接笔记</button>
    </div>

    <div class="main">
      <div class="sidebar" id="sidebar">
        <div class="filter-section">
          <label>搜索</label>
          <input type="text" class="search-box" id="searchBox" placeholder="搜索笔记内容…">
        </div>
        <div class="filter-section">
          <label>相似度阈值</label>
          <input type="range" class="sim-slider" id="simSlider" min="15" max="60" value="35">
          <div class="slider-labels">
            <span>更多连线</span>
            <span class="sim-val" id="simValue">0.35</span>
            <span>更少连线</span>
          </div>
        </div>
        <div class="filter-section">
          <label>主题</label>
          <div class="filter-chips" id="themeChips"></div>
        </div>
        <div class="filter-section">
          <label>情绪</label>
          <div class="filter-chips" id="emotionChips"></div>
        </div>
        <div class="filter-section">
          <label>类型</label>
          <div class="filter-chips" id="typeChips"></div>
        </div>
      </div>

      <div class="canvas" id="graphView">
        <svg id="graphSvg"></svg>
        <div class="legend" id="legend"></div>
      </div>

      <div class="timeline-container" id="timelineView"></div>
      <div class="bridges-view" id="bridgesView"></div>
    </div>
  </div>

  <!-- ─── Tooltip ──────────────────────────── -->
  <div class="tooltip" id="tooltip"></div>

  <!-- ─── 详情面板 ─────────────────────────── -->
  <div class="detail-panel" id="detailPanel">
    <button class="close-btn" id="closeDetail">✕</button>
    <div id="detailContent"></div>
  </div>

  <!-- ─── 设置面板 ─────────────────────────── -->
  <div class="settings-overlay" id="settingsPanel">
    <div class="settings-card">
      <h2>⚙️ AI 增强设置</h2>
      <label>Google Gemini API Key</label>
      <input type="text" id="apiKeyInput" placeholder="AIzaSy...">
      <p class="hint">
        填入后，将使用 Gemini 2.0 Flash 进行语义标注 + 嵌入向量化，分析质量显著提升。<br>
        <a href="https://aistudio.google.com/apikey" target="_blank">获取免费 API Key →</a><br>
        🔒 Key 仅存储在浏览器本地，不经过任何第三方服务器。
      </p>
      <div class="settings-actions">
        <button class="btn-ghost" id="clearApiKey">清除 Key</button>
        <button class="btn btn-secondary" id="closeSettings">取消</button>
        <button class="btn btn-primary" id="saveApiKey">保存</button>
      </div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="analyzer.js"></script>
  <script src="app.js"></script>
  <script>
    // Wire settings button in viz header too
    document.getElementById('settingsBtn2')?.addEventListener('click', () =>
      document.getElementById('settingsPanel').classList.add('open'));
  </script>
</body>
</html>
